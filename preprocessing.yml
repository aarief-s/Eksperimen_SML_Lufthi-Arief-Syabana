name: Automated Preprocessing — Lufthi Arief Syabana

on:
  # Trigger manual dari GitHub UI
  workflow_dispatch:

  # Trigger otomatis setiap kali ada push ke main yang menyentuh file dataset atau script
  push:
    branches:
      - main
    paths:
      - 'smartphone_usage_raw.csv'
      - 'preprocessing/automate_Lufthi-Arief-Syabana.py'

  # Trigger terjadwal setiap hari Senin pukul 07:00 UTC
  schedule:
    - cron: '0 7 * * 1'

jobs:
  preprocessing:
    name: Run Data Preprocessing
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ──────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ─────────────────────────────────────────────────────
      - name: Set Up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas==2.2.2 numpy==1.26.4 scikit-learn==1.5.1

      # ── 4. Verifikasi file dataset tersedia ──────────────────────────────────
      - name: Verify Dataset Exists
        run: |
          echo "=== Cek ketersediaan dataset ==="
          ls -lh smartphone_usage_raw.csv
          echo "Dataset ditemukan, siap diproses."

      # ── 5. Jalankan script preprocessing ────────────────────────────────────
      - name: Run Preprocessing Script
        run: |
          cd preprocessing
          python automate_Lufthi-Arief-Syabana.py \
            --input ../smartphone_usage_raw.csv \
            --output smartphone_usage_preprocessing

      # ── 6. Verifikasi output ─────────────────────────────────────────────────
      - name: Verify Output Files
        run: |
          echo "=== Hasil Preprocessing ==="
          ls -lh preprocessing/smartphone_usage_preprocessing/
          echo ""
          echo "=== Preview smartphone_usage_preprocessing.csv (5 baris pertama) ==="
          head -6 preprocessing/smartphone_usage_preprocessing/smartphone_usage_preprocessing.csv
          echo ""
          echo "=== Jumlah baris ==="
          wc -l preprocessing/smartphone_usage_preprocessing/train.csv
          wc -l preprocessing/smartphone_usage_preprocessing/test.csv

      # ── 7. Commit & push hasil preprocessing kembali ke repo ─────────────────
      - name: Commit Preprocessed Dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/smartphone_usage_preprocessing/
          git diff --staged --quiet || git commit -m "ci: update preprocessed dataset [skip ci] — $(date +'%Y-%m-%d %H:%M:%S')"

      - name: Push Changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
